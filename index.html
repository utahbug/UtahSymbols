<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#23322c">
  <meta name="description" content="Test your knowledge of Utah's official state symbols with simple tap-to-reveal cards.">
  <title>Utah State Symbols</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <style>
    :root {
      --ink: #1f2428;
      --muted: #626b71;
      --page: #f7f4ec;
      --panel: #fffdf8;
      --line: #d8cfc0;
      --redrock: #b45737;
      --sage: #647a5d;
      --night: #23322c;
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(180, 87, 55, .14), transparent 26rem),
        radial-gradient(circle at 90% 18%, rgba(45, 111, 139, .12), transparent 24rem),
        var(--page);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.5;
    }

    button { font: inherit; }

    .app-header {
      color: #fff;
      background:
        linear-gradient(120deg, rgba(28, 39, 34, .97), rgba(55, 82, 70, .92)),
        var(--night);
      border-bottom: 6px solid #d2a342;
    }

    .header-inner,
    main,
    footer {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
    }

    .header-inner {
      min-height: 142px;
      padding: 19px 0;
      display: grid;
      align-content: center;
      gap: 8px;
    }

    .kicker {
      margin: 0;
      color: #f1d88b;
      font-size: .78rem;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 9vw, 6.5rem);
      line-height: .92;
      letter-spacing: -.04em;
    }

    .header-inner p:last-child {
      max-width: 720px;
      margin: 8px 0 0;
      color: #edf6f3;
      font-size: clamp(1rem, 2vw, 1.18rem);
    }

    main { padding: 12px 0 42px; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .instructions {
      margin: 0;
      color: var(--muted);
      font-weight: 750;
    }

    .progress {
      display: inline-block;
      margin-left: .45rem;
      font-size: .9rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    .sort-control {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 800;
    }

    .sort-control select {
      min-height: 42px;
      border: 1px solid #b9c4bb;
      border-radius: 8px;
      padding: 7px 30px 7px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 400;
      cursor: pointer;
    }

    .sort-control option { font-weight: 400; }

    .sort-control select:focus-visible {
      border-color: #789885;
      box-shadow: 0 0 0 3px rgba(73, 122, 88, .18);
      outline: none;
    }

    .reset,
    .show-all {
      min-height: 42px;
      border: 1px solid #b9c4bb;
      border-radius: 8px;
      padding: 8px 14px;
      background: #fff;
      color: #245b50;
      font-weight: 900;
      cursor: pointer;
    }

    .reset:hover,
    .reset:focus-visible,
    .show-all:hover,
    .show-all:focus-visible {
      border-color: #789885;
      box-shadow: 0 0 0 3px rgba(73, 122, 88, .18);
      outline: none;
    }

    .show-all {
      border-color: #245b50;
      background: #245b50;
      color: #fff;
    }

    .reveal-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 11px;
    }

    .reveal-card {
      position: relative;
      min-height: 190px;
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
      cursor: pointer;
      perspective: 900px;
    }

    .reveal-card:hover,
    .reveal-card:focus-visible {
      transform: translateY(-2px);
      outline: none;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 5px 14px rgba(50, 60, 54, .07);
      transform-style: preserve-3d;
      transition: transform 500ms cubic-bezier(.2, .75, .25, 1);
    }

    .reveal-card:hover .card-inner,
    .reveal-card:focus-visible .card-inner {
      border-color: #9fb5a7;
      box-shadow: 0 10px 24px rgba(50, 60, 54, .13);
    }

    .reveal-card.is-revealed .card-inner { transform: rotateY(180deg); }

    .reveal-card.flip-spin.is-revealed .card-inner {
      transform: rotateY(540deg);
      transition-duration: 700ms;
    }

    .reveal-card.flip-vertical .card-back { transform: rotateX(180deg); }

    .reveal-card.flip-vertical.is-revealed .card-inner {
      transform: rotateX(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 9px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-front {
      display: grid;
      place-content: center;
      gap: 4px;
      padding: 14px;
      background: #f6dfaa;
      text-align: center;
    }

    .reveal-card.tone-sand .card-front {
      background: #f2c98d;
      color: #56351f;
    }

    .reveal-card.tone-sage .card-front {
      background: #b9d5ca;
      color: #193f36;
    }

    .reveal-card.tone-blue .card-front {
      background: #c9d8e7;
      color: #203e58;
    }

    .reveal-card.tone-lavender .card-front {
      background: #d8c5dc;
      color: #49334e;
    }

    .card-back {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      background: #edf5f0;
      transform: rotateY(180deg);
    }

    .prompt {
      font-size: 1.04rem;
      font-weight: 900;
    }

    .tap-label {
      color: currentColor;
      font-size: .91rem;
      font-style: italic;
      opacity: .78;
    }

    .symbol-image {
      min-height: 0;
      background-image: none;
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
    }

    .symbol-image.is-mirrored { transform: scaleX(-1); }

    .answer {
      display: grid;
      place-items: center;
      gap: 1px;
      min-height: 48px;
      padding: 6px 10px;
      color: #245b50;
      font-size: .95rem;
      font-weight: 900;
      text-align: center;
    }

    .adoption-year {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 500;
    }

    footer {
      padding: 20px 0 30px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      display: grid;
      gap: 8px;
      text-align: center;
      font-size: .92rem;
    }

    .reference-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 14px;
    }

    .reference-links a {
      color: #245b50;
      font-weight: 800;
      text-underline-offset: 3px;
    }

    @media (max-width: 850px) {
      .reveal-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      .header-inner { min-height: 128px; }
      .toolbar { align-items: stretch; }
      .toolbar-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .sort-control {
        grid-column: 1 / -1;
        justify-content: space-between;
      }
      .sort-control select { flex: 1; }
      .reset, .show-all { width: 100%; }
      .reveal-grid { grid-template-columns: 1fr; }
      .reveal-card { min-height: 250px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .card-inner { transition: none; }
    }
  </style>
</head>

      <button class="reveal-card extra-card" style="--sprite-x: 100%; --sprite-y: 66.667%;" type="button" data-answer="Utahn" aria-pressed="false"><span class="card-inner"><span class="card-face card-front"><span class="prompt">Demonym</span><span class="tap-label">Tap to reveal</span></span><span class="card-face card-back"><span class="symbol-image" role="img" aria-label="Utah residents"></span><span class="answer" aria-live="polite">Utahn</span></span></span></button>
      <button class="reveal-card extra-card" style="--sprite-x: 0%; --sprite-y: 83.333%;" type="button" data-answer="Artemia franciscana (brine shrimp)" aria-pressed="false"><span class="card-inner"><span class="card-face card-front"><span class="prompt">Crustacean</span><span class="tap-label">Tap to reveal</span></span><span class="card-face card-back"><span class="symbol-image" role="img" aria-label="Brine shrimp"></span><span class="answer" aria-live="polite">Artemia franciscana (brine shrimp)</span></span></span></button>
      <button class="reveal-card extra-card" style="--sprite-x: 50%; --sprite-y: 83.333%;" type="button" data-answer="Dutch oven" aria-pressed="false"><span class="card-inner"><span class="card-face card-front"><span class="prompt">Cooking pot</span><span class="tap-label">Tap to reveal</span></span><span class="card-face card-back"><span class="symbol-image" role="img" aria-label="Dutch oven"></span><span class="answer" aria-live="polite">Dutch oven</span></span></span></button>
      <button class="reveal-card extra-card" style="--sprite-x: 100%; --sprite-y: 83.333%;" type="button" data-answer="Utah Centennial Tartan" aria-pressed="false"><span class="card-inner"><span class="card-face card-front"><span class="prompt">Centennial tartan</span><span class="tap-label">Tap to reveal</span></span><span class="card-face card-back"><span class="symbol-image" role="img" aria-label="Utah Centennial Tartan"></span><span class="answer" aria-live="polite">Utah Centennial Tartan</span></span></span></button>
      <button class="reveal-card extra-card" style="--sprite-x: 0%; --sprite-y: 100%;" type="button" data-answer="Dubhe" aria-pressed="false"><span class="card-inner"><span class="card-face card-front"><span class="prompt">Centennial star</span><span class="tap-label">Tap to reveal</span></span><span class="card-face card-back"><span class="symbol-image" role="img" aria-label="Dubhe in the Big Dipper"></span><span class="answer" aria-live="polite">Dubhe</span></span></span></button>
      <button class="reveal-card extra-card" style="--sprite-x: 50%; --sprite-y: 100%;" type="button" data-answer="Golden eagle" aria-pressed="false"><span class="card-inner"><span class="card-face card-front"><span class="prompt">Bird of prey</span><span class="tap-label">Tap to reveal</span></span><span class="card-face card-back"><span class="symbol-image" role="img" aria-label="Golden eagle"></span><span class="answer" aria-live="polite">Golden eagle</span></span></span></button>
      <button class="reveal-card extra-card" style="--sprite-x: 100%; --sprite-y: 100%;" type="button" data-answer="Square dance" aria-pressed="false"><span class="card-inner"><span class="card-face card-front"><span class="prompt">Folk dance</span><span class="tap-label">Tap to reveal</span></span><span class="card-face card-back"><span class="symbol-image" role="img" aria-label="Square dancers"></span><span class="answer" aria-live="polite">Square dance</span></span></span></button>
    </section>

  <footer>

    <span class="reference-links">
      <a href="https://le.utah.gov/xcode/Title63G/Chapter1/63G-1-S601.html" target="_blank" rel="noopener">Utah Code §63G-1-601</a>
      <a href="https://onlinelibrary.utah.gov/state-symbol/" target="_blank" rel="noopener">Utah’s Official Symbols &amp; Emblems</a>
    </span>
  </footer>

  <script>
    const cards = document.querySelectorAll(".reveal-card");
    const tapLabels = document.querySelectorAll(".tap-label");
    const resetButton = document.querySelector("#reset");
    const showAllButton = document.querySelector("#show-all");
    const sortCardsSelect = document.querySelector("#sort-cards");
    const cardGrid = document.querySelector(".reveal-grid");
    const progress = document.querySelector("#progress");
    const officialOrder = Array.from(cards);
    const colorTones = ["tone-sand", "tone-sage", "tone-blue", "tone-lavender"];
    const balancedShuffle = [0, 2, 1, 3, 1, 3, 0, 2, 3, 1, 2, 0, 2, 0, 3, 1];
    const categoryGroups = [
      [
        "Rocky Mountain elk", "California gull", "Honey bee",
        "Bonneville cutthroat trout", "Allosaurus", "Gila monster",
        "Utahraptor", "Artemia franciscana (brine shrimp)", "Golden eagle"
      ],
      [
        "Sego lily", "Quaking aspen", "Cherry", "Spanish sweet onion",
        "Sugar beet", "Indian ricegrass", "Porcini"
      ],
      ["Topaz", "Copper", "Honeycomb calcite", "Coal"],
      [
        "Industry", "Beehive", "The Great Seal of the State of Utah",
        "Historic Utah state flag", "Utah state flag", "Honor and Remember Flag"
      ],
      [
        "Utah, This Is the Place", "Utah, We Love Thee", "Spiral Jetty",
        "Native American rock art", "Utahn", "Dutch oven",
        "Utah Centennial Tartan", "Square dance"
      ],
      ["Skiing and snowboarding"],
      ["Ogden Union Station", "Fort Douglas Military Museum", "M1911 automatic pistol"],
      ["Beehive Cluster", "Dubhe"]
    ];
    const categoryRanks = new Map(
      categoryGroups.flatMap((group, rank) => group.map((answer) => [answer, rank]))
    );

    Array.from(cards)
      .sort((a, b) => a.dataset.answer.localeCompare(b.dataset.answer))
      .forEach((card, index) => {
        card.classList.add(colorTones[balancedShuffle[index % balancedShuffle.length]]);
      });

    tapLabels.forEach((label) => label.remove());

    const incorporationYears = new Map([
      ["Rocky Mountain elk", 1971],
      ["California gull", 1955],
      ["Sego lily", 1911],
      ["Quaking aspen", 2014],
      ["Honey bee", 1983],
      ["Bonneville cutthroat trout", 1997],
      ["Topaz", 1969],
      ["Copper", 1994],
      ["Allosaurus", 1988],
      ["Cherry", 1997],
      ["Spanish sweet onion", 2002],
      ["Sugar beet", 2002],
      ["Indian ricegrass", 1990],
      ["Porcini", 2023],
      ["Utah, This Is the Place", 2003],
      ["Utah, We Love Thee", 2003],
      ["Industry", 1959],
      ["Beehive", 1959],
      ["Spiral Jetty", 2017],
      ["Beehive Cluster", 1996],
      ["Skiing and snowboarding", 2012],
      ["Honeycomb calcite", 2021],
      ["The Great Seal of the State of Utah", 1896],
      ["Coal", 1991],
      ["Gila monster", 2019],
      ["Ogden Union Station", 1988],
      ["Fort Douglas Military Museum", 2020],
      ["Native American rock art", 2017],
      ["Historic Utah state flag", 2023],
      ["Utah state flag", 2024],
      ["M1911 automatic pistol", 2011],
      ["Honor and Remember Flag", 2011],
      ["Utahraptor", 2018],
      ["Utahn", 2025],
      ["Artemia franciscana (brine shrimp)", 2023],
      ["Dutch oven", 1997],
      ["Utah Centennial Tartan", 1997],
      ["Dubhe", 1996],
      ["Golden eagle", 2022],
      ["Square dance", 1994],
    ]);

    const cardImages = new Map([
      ["Rocky Mountain elk", "rocky-mountain-elk.png"],
      ["California gull", "california-gull.png"],
      ["Sego lily", "sego-lily.png"],
      ["Quaking aspen", "quaking-aspen.png"],
      ["Honey bee", "honey-bee.png"],
      ["Bonneville cutthroat trout", "bonneville-cutthroat-trout.png"],
      ["Topaz", "topaz.png"],
      ["Copper", "copper.png"],
      ["Allosaurus", "allosaurus.png"],
      ["Cherry", "cherry.png"],
      ["Spanish sweet onion", "spanish-sweet-onion.png"],
      ["Sugar beet", "sugar-beet.png"],
      ["Indian ricegrass", "indian-ricegrass.png"],
      ["Porcini", "porcini.png"],
      ["Utah, This Is the Place", "state-song.png"],
      ["Utah, We Love Thee", "state-hymn.png"],
      ["Industry", "industry.png"],
      ["Beehive", "beehive.png"],
      ["Spiral Jetty", "spiral-jetty.png"],
      ["Beehive Cluster", "beehive-cluster.png"],
      ["Skiing and snowboarding", "skiing-snowboarding.png"],
      ["Honeycomb calcite", "honeycomb-calcite.png"],
      ["The Great Seal of the State of Utah", "great-seal.png"],
      ["Coal", "coal.png"],
      ["Gila monster", "gila-monster.png"],
      ["Ogden Union Station", "ogden-union-station.png"],
      ["Fort Douglas Military Museum", "fort-douglas.png"],
      ["Native American rock art", "native-american-rock-art.png"],
      ["Historic Utah state flag", "historic-state-flag.png"],
      ["Utah state flag", "utah-state-flag.png"],
      ["M1911 automatic pistol", "m1911.png"],
      ["Honor and Remember Flag", "honor-remember-flag.png"],
      ["Utahraptor", "utahraptor.png"],
      ["Utahn", "utahn.png"],
      ["Artemia franciscana (brine shrimp)", "brine-shrimp.png"],
      ["Dutch oven", "dutch-oven.png"],
      ["Utah Centennial Tartan", "utah-centennial-tartan.png"],
      ["Dubhe", "dubhe.png"],
      ["Golden eagle", "golden-eagle.png"],
      ["Square dance", "square-dance.png"],
    ]);
    const mirroredImages = new Set([
      "M1911 automatic pistol",
      "Gila monster",
    ]);
    const containedImages = new Set([
      "The Great Seal of the State of Utah",
      "Gila monster",
    ]);

    officialOrder.forEach((card) => {
      const image = card.querySelector(".symbol-image");
      const answer = card.querySelector(".answer");
      const answerName = document.createElement("span");
      const adoptionYear = document.createElement("span");
      const front = card.querySelector(".card-front");
      const back = card.querySelector(".card-back");
      const prompt = card.querySelector(".prompt").textContent;
      const year = incorporationYears.get(card.dataset.answer);

      answerName.textContent = card.dataset.answer;
      adoptionYear.className = "adoption-year";
      adoptionYear.textContent = `Adopted ${year}`;
      answer.replaceChildren(answerName, adoptionYear);

      front.setAttribute("aria-hidden", "false");
      back.setAttribute("aria-hidden", "true");
      card.setAttribute("aria-label", `${prompt}. Flip card to reveal answer.`);

      image.style.backgroundImage =
        `url("assets/card-images/${cardImages.get(card.dataset.answer)}")`;
      image.style.backgroundSize =
        containedImages.has(card.dataset.answer)
          ? "contain"
          : "cover";
      if (card.dataset.answer === "Cherry") {
        image.style.backgroundPosition = "center 60%";
      }
      image.classList.toggle(
        "is-mirrored",
        mirroredImages.has(card.dataset.answer),
      );
    });

    function setCard(card, revealed) {
      const prompt = card.querySelector(".prompt").textContent;
      const year = incorporationYears.get(card.dataset.answer);
      card.classList.toggle("is-revealed", revealed);
      card.setAttribute("aria-pressed", String(revealed));
      card.querySelector(".card-front").setAttribute("aria-hidden", String(revealed));
      card.querySelector(".card-back").setAttribute("aria-hidden", String(!revealed));
      card.setAttribute(
        "aria-label",
        revealed
          ? `${prompt}: ${card.dataset.answer}, adopted ${year}. Flip card to hide answer.`
          : `${prompt}. Flip card to reveal answer.`,
      );
    }

    function updateProgress() {
      const revealedCount = cardGrid.querySelectorAll(".is-revealed").length;
      progress.textContent = `${revealedCount} of ${cards.length} revealed`;
    }

    function chooseFlipStyle(card) {
      card.classList.remove("flip-spin", "flip-vertical");
      const roll = Math.random();

      if (roll < 0.08) {
        card.classList.add("flip-spin");
      } else if (roll < 0.16) {
        card.classList.add("flip-vertical");
      }
    }

    cards.forEach((card) => {
      card.addEventListener("click", () => {
        const revealing = !card.classList.contains("is-revealed");
        if (revealing) chooseFlipStyle(card);
        setCard(card, revealing);
        updateProgress();
      });
    });

    resetButton.addEventListener("click", () => {
      cards.forEach((card) => setCard(card, false));
      updateProgress();
      cardGrid.querySelector(".reveal-card").focus();
    });

    showAllButton.addEventListener("click", () => {
      cards.forEach((card) => {
        card.classList.remove("flip-spin", "flip-vertical");
        setCard(card, true);
      });
      updateProgress();
      cardGrid.querySelector(".reveal-card").focus();
    });

    sortCardsSelect.addEventListener("change", () => {
      const mode = sortCardsSelect.value;
      const sortedCards = Array.from(cards);

      sortedCards.sort((a, b) => {
        const aTitle = a.querySelector(".prompt").textContent;
        const bTitle = b.querySelector(".prompt").textContent;

        if (mode === "date") {
          const yearDifference =
            incorporationYears.get(a.dataset.answer) -
            incorporationYears.get(b.dataset.answer);
          if (yearDifference !== 0) return yearDifference;
        }

        if (mode === "category") {
          const categoryDifference =
            categoryRanks.get(a.dataset.answer) -
            categoryRanks.get(b.dataset.answer);
          if (categoryDifference !== 0) return categoryDifference;
        }

        return (
          aTitle.localeCompare(bTitle) ||
          a.dataset.answer.localeCompare(b.dataset.answer)
        );
      });

      sortedCards.forEach((card) => cardGrid.append(card));
    });

    sortCardsSelect.dispatchEvent(new Event("change"));
  </script>
